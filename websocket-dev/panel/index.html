<!DOCTYPE html>
    <head>
        <style>
            body{
                font-family: sans-serif;
            }
            .websocket_test{
                padding: 0 0 10px 0;
            }
            .buttons, .groups{
                display: flex;
                flex-flow: row wrap;
                gap: 4px;
                padding: 4px 0;
            }
            .static{
                display: flex;
                flex-flow: row wrap;
                gap: 4px;
                position: absolute;
                bottom: 10px;
                right: 10px;
            }
            .label{
                position: absolute;
                bottom: 10px;
                left: 10px;
                font-weight: bold;
                font-family: sans-serif;
            }
        </style>
        <script type="text/javascript" src="../jquery.min.js"></script>
    </head>
    <body>
        <div class="websocket_test"></div>
        <div class="buttons"></div>
        <div class="groups"></div>
        <div class="static">
            <button onclick="refresh()">Refresh</button>
            <button onclick="refreshAll()">Refresh All</button>
        </div>
        <div class="label">panel</div>
        <script>

            const identifier = 'panel';

            let wss = init(identifier);
            setInterval(
                ()=>{ if (!wss) { init(identifier) } },
                2000,
                wss,
                identifier
            );
            
            function init(identifier){

                let port = 1165;

                websocket = new WebSocket('wss://localhost:' + port + '/' + identifier, 'echo-protocol');

                websocket.onopen = () => {
                    console.log('Socket connected.');
                    websocket.send(JSON.stringify({ 'action': 'refresh', 'data': { 'target': 'all' }, 'source': identifier }));
                };

                websocket.onmessage = (event) => {
                    jQuery(function($){

                        // Handle data from message
                        const data = JSON.parse(event.data);

                        // Output message
                        jQuery('.websocket_test').html('Incoming ' + data.action + ' from ' + data.source + '.');

                        if ( data.action == 'refresh' || data.action == 'close' ){
                            
                            // Populate the buttons
                            const buttonList = data.userList.sort();
                            $('.buttons').html('');
                            buttonList.forEach(element => {
                                if (element !== identifier) {
                                    $('.buttons').append('<button onclick="handleButton(\'' + element + '\');">' + element + '</button>');
                                }
                            });

                            // Populate the group
                            const groupList = data.groupList.sort();
                            $('.groups').html('');
                            groupList.forEach(element => {
                                if (element !== identifier) {
                                    $('.groups').append('<button onclick="handleButton(\'' + element + '\');">' + element + '</button>');
                                }
                            });
                        
                        }
                        else if ( data.action == 'ping' ){
                            jQuery('.websocket_test').html('Ping from ' + data.source + '.');
                        }
                    });
                };

                websocket.onclose = function(e) {
                    console.log('Socket is closed. Reconnect will be attempted in 1 second.', e.reason);
                    setTimeout(function(identifier) {
                        wss = init(identifier);
                    }, 1000, identifier);
                };

                websocket.onerror = function(err) {
                    console.error('Socket encountered error: ', err.message, 'Closing socket');
                    websocket.close();
                };

                window.addEventListener("beforeunload", (event) => {
                    websocket.send(JSON.stringify({ 'action': 'close', 'source': identifier }));
                    websocket.close();
                });

                return websocket;
            }

            function refresh(){
                wss.send(JSON.stringify({ 'action': 'refresh', 'source': identifier }));
            }

            function refreshAll(){
                wss.send(JSON.stringify({ 'action': 'refresh', 'data': { 'target': 'all' }, 'source': identifier }));
            }

            function handleButton(button){
                jQuery('.websocket_test').html('Ping ' + button + '.');
                wss.send(JSON.stringify( { 'action': 'ping', 'data': { 'target': button }, 'source': identifier }));
            }
        
        </script>
    </body>
</html>
